<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" fill="none">
  <defs>
    <radialGradient id="circleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="dotGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Trailing dots - row 1 (top) -->
  <circle cx="14" cy="38" r="2.8" fill="url(#dotGrad)" opacity="0.5" filter="url(#glow)"/>
  <circle cx="24" cy="38" r="3.2" fill="url(#dotGrad)" opacity="0.65" filter="url(#glow)"/>
  <circle cx="35" cy="38" r="3.6" fill="url(#dotGrad)" opacity="0.8" filter="url(#glow)"/>

  <!-- Trailing dots - row 2 (middle-top) -->
  <circle cx="10" cy="47" r="2.5" fill="url(#dotGrad)" opacity="0.45" filter="url(#glow)"/>
  <circle cx="21" cy="47" r="3.0" fill="url(#dotGrad)" opacity="0.6" filter="url(#glow)"/>
  <circle cx="33" cy="47" r="3.5" fill="url(#dotGrad)" opacity="0.75" filter="url(#glow)"/>
  <circle cx="46" cy="47" r="4.0" fill="url(#dotGrad)" opacity="0.9" filter="url(#glow)"/>

  <!-- Trailing dots - row 3 (middle) -->
  <circle cx="8"  cy="57" r="2.2" fill="url(#dotGrad)" opacity="0.4" filter="url(#glow)"/>
  <circle cx="19" cy="57" r="2.8" fill="url(#dotGrad)" opacity="0.55" filter="url(#glow)"/>
  <circle cx="31" cy="57" r="3.3" fill="url(#dotGrad)" opacity="0.7" filter="url(#glow)"/>
  <circle cx="44" cy="57" r="3.8" fill="url(#dotGrad)" opacity="0.85" filter="url(#glow)"/>

  <!-- Trailing dots - row 4 (middle-bottom) -->
  <circle cx="14" cy="67" r="2.8" fill="url(#dotGrad)" opacity="0.5" filter="url(#glow)"/>
  <circle cx="24" cy="67" r="3.2" fill="url(#dotGrad)" opacity="0.65" filter="url(#glow)"/>
  <circle cx="35" cy="67" r="3.6" fill="url(#dotGrad)" opacity="0.8" filter="url(#glow)"/>

  <!-- Main outer ring -->
  <circle cx="108" cy="50" r="38" stroke="url(#circleGrad)" stroke-width="7" fill="none" filter="url(#glow)"/>

  <!-- Inner arc rings (concentric, slightly open on left) -->
  <path d="M 108,72 A 22,22 0 1,1 108.01,72" stroke="url(#circleGrad)" stroke-width="5" fill="none" opacity="0.85" filter="url(#glow)" stroke-dasharray="115 25"/>
  <path d="M 108,62 A 12,12 0 1,1 108.01,62" stroke="url(#circleGrad)" stroke-width="4" fill="none" opacity="0.75" filter="url(#glow)" stroke-dasharray="60 18"/>

  <!-- Center dot -->
  <circle cx="108" cy="50" r="5" fill="url(#circleGrad)" filter="url(#glow)"/>
</svg>
